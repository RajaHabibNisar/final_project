<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Eye Care Clinic</title>
    <link rel="stylesheet" href="finalstyle.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>Eye Care Clinic</h1>
        </div>

        <nav class="nav">
            <a href="index.html">Home</a>

            <a href="services.html">Other Services</a>
            <a href="appointment.html">Book Appointment</a>
            <a href="contact.html">Contact Us</a>
        </nav>

   <a href="appointment.html" class="btn">Book Appointment</a>
    </header>

    <main>

        <!-- HERO -->
        <section class="hero">
            <div class="container">
                <h2>Book an Appointment</h2>
                <p>Schedule your visit with our expert eye specialists</p>
            </div>
        </section>

        <!-- FORM SECTION -->
        <section class="container">
            <div class="form-box">
                <h3>Appointment Form</h3>

                <form class="form">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="text" placeholder="Phone Number" required>

                    <select required>
                        <option value="">Select Service</option>
                        <option>Eye Checkup</option>
                        <option>Contact Lenses</option>
                        <option>Laser Treatment</option>
                        <option>Surgery Consultation</option>
                    </select>

                    <input type="date" required>
                    <input type="time" required>

                    <textarea placeholder="Additional Notes" rows="4"></textarea>

                    <button type="submit" class="btn full">Book Appointment</button>
                </form>
            </div>
        </section>

    </main>

</body>
</html>
