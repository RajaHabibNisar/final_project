<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Eye Care Clinic</title>
    <link rel="stylesheet" href="finalstyle.css">
</head>
<body>

    <!-- HEADER (same as your home page) -->
    <header class="header">
        <div>
            <h1>Eye Care Clinic</h1>
        </div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="services.html">Other Services</a>
            <a href="Appointment.html">Book Appointment</a>
            <a href="contact.html">Contact Us</a>
        </nav>
        <a href="appointment.html" class="btn">Book Appointment</a>
    </header>

    <main>

        <!-- HERO SECTION -->
        <section class="contact-hero">
            <div class="hero-content">
                <h2>Contact Us</h2>
                <p>We are here to help you with your eye care needs</p>
            </div>
        </section>

        <!-- CONTACT SECTION -->
        <section class="contact-section">

            <!-- LEFT SIDE: INFO -->
            <div class="contact-info">
                <h3>Get In Touch</h3>
                <p><strong>Address:</strong> Lahore, Pakistan</p>
                <p><strong>Phone:</strong> 0300-1234567</p>
                <p><strong>Email:</strong> info@eyecare.com</p>
                <p><strong>Hours:</strong> 9:00 AM – 6:00 PM</p>
            </div>

            <!-- RIGHT SIDE: FORM -->
            <div class="contact-form">
                <h3>Send Message</h3>
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="text" placeholder="Your Phone">
                    <textarea placeholder="Your Message" rows="5"></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>

        </section>

    </main>

</body>
</html>
